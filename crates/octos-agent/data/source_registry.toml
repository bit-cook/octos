# Source Registry Configuration
# 搜索源注册表 - 主题到搜索引擎/语言/门户的映射

[meta]
version = "1.0.0"
description = "Deep Research V2 Source Registry"

# -----------------------------------------------------------------------------
# 搜索引擎配置
# -----------------------------------------------------------------------------

[[search_engine]]
name = "serper"
display_name = "Serper.dev"
backend_type = "serper_api"
requires_api_key = true
api_key_env = "SERPER_API_KEY"
docs_url = "https://serper.dev/docs"
supports = ["web", "news", "images", "places"]

[[search_engine]]
name = "google_cse"
display_name = "Google Custom Search"
backend_type = "google_cse"
requires_api_key = true
api_key_env = "GOOGLE_CSE_API_KEY"
extra_env = ["GOOGLE_CSE_ID"]
docs_url = "https://developers.google.com/custom-search"
note = "CSE closing to new customers Jan 2027"
supports = ["web"]

[[search_engine]]
name = "baidu"
display_name = "百度搜索"
backend_type = "baidu_scrape"
requires_api_key = false
note = "HTML scraping, may require proxy in some regions"
supports = ["web"]

[[search_engine]]
name = "brave"
display_name = "Brave Search"
backend_type = "brave_api"
requires_api_key = true
api_key_env = "BRAVE_API_KEY"
free_tier = "2000/month"
supports = ["web", "news"]

[[search_engine]]
name = "perplexity"
display_name = "Perplexity Sonar"
backend_type = "perplexity_api"
requires_api_key = true
api_key_env = "PERPLEXITY_API_KEY"
note = "AI meta-search for verification"
supports = ["web"]

[[search_engine]]
name = "duckduckgo"
display_name = "DuckDuckGo"
backend_type = "ddg_scrape"
requires_api_key = false
note = "Default fallback, HTML scraping"
supports = ["web", "news"]

# -----------------------------------------------------------------------------
# 主题源配置
# -----------------------------------------------------------------------------

# 科技/AI 主题
[[topic_source]]
topic = "technology"
keywords = ["AI", "artificial intelligence", "machine learning", "tech", "software", "芯片", "半导体"]

[[topic_source.search_priority]]
engine = "serper"
priority = 1
languages = ["en", "zh"]

[[topic_source.search_priority]]
engine = "perplexity"
priority = 2
languages = ["en"]
use_for = "verification"

[[topic_source.portals]]
name = "arXiv"
url_pattern = "https://arxiv.org/search/?query={query}"
content_type = "academic"
reliability = "high"

[[topic_source.portals]]
name = "GitHub"
url_pattern = "https://github.com/search?q={query}"
content_type = "code"
reliability = "medium"

[[topic_source.portals]]
name = "TechCrunch"
url_pattern = "https://techcrunch.com/?s={query}"
content_type = "news"
reliability = "medium"

[[topic_source.portals]]
name = "The Verge"
url_pattern = "https://www.theverge.com/search?q={query}"
content_type = "news"
reliability = "medium"

[[topic_source.portals]]
name = "机器之心"
url_pattern = "https://www.jiqizhixin.com/search?q={query}"
content_type = "news"
language = "zh"
reliability = "medium"

[[topic_source.portals]]
name = "品玩"
url_pattern = "https://www.pingwest.com/?s={query}"
content_type = "news"
language = "zh"
reliability = "medium"

